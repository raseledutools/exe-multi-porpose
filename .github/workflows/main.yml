name: Build RasFocus Pro Max (Win32)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake (Auto-installs vcpkg libraries)
        # CMake vcpkg.json দেখে নিজেই সব ইনস্টল করে নেবে!
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows -A x64

      - name: Build Executable
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-Pro-Max-App
          path: build/Release/RasFocusProMax.exe
